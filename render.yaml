services:
  - type: web
    name: portfolio
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT "app:create_app('production')"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
disk:
      name: portfolio-data
      mountPath: /data
      sizeGB: 1
```

Then your `init_db.py` and `create_admin.py` run once and data persists forever.

**Option B — Use Render PostgreSQL free for 90 days**, then export and migrate. Fine if you just want to get live now and deal with it later.

**My recommendation: Option A.** SQLite handles 50–100 visits/day with zero issues. You're not running a bank.

