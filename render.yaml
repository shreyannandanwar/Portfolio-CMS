## Step 3 — Deploy on Render (15 mins)

1. Push everything to GitHub including `Procfile`, `render.yaml`, updated `requirements.txt`
2. Go to [render.com](https://render.com) → Sign up with GitHub
3. Click **New** → **Web Service**
4. Connect your GitHub repo → select it
5. Render auto-detects the `render.yaml` — review and confirm
6. Set these environment variables in the dashboard:
```
SECRET_KEY          → generate one here: python -c "import secrets; print(secrets.token_hex(32))"
DATABASE_URL        → sqlite:////data/portfolio.db
GITHUB_USERNAME     → shreyannandanwar
ADMIN_URL_PREFIX    → /your-obscured-admin-path
LOG_LEVEL           → WARNING
FLASK_ENV           → production